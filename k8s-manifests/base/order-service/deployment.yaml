apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "order-service-role"
        vault.hashicorp.com/agent-inject-secret-app_name: "kv/data/order-service"
        vault.hashicorp.com/agent-inject-template-app_name: |
          {{- with secret "kv/data/order-service" -}}{{ .Data.data.app_name }}{{- end }}
        vault.hashicorp.com/agent-inject-secret-kafka_broker: "kv/data/order-service"
        vault.hashicorp.com/agent-inject-template-kafka_broker: |
          {{- with secret "kv/data/order-service" -}}{{ .Data.data.kafka_broker }}{{- end }}
        vault.hashicorp.com/agent-inject-secret-redis_url: "kv/data/order-service"
        vault.hashicorp.com/agent-inject-template-redis_url: |
          {{- with secret "kv/data/order-service" -}}{{ .Data.data.redis_url }}{{- end }}
        vault.hashicorp.com/agent-inject-secret-http_port: "kv/data/order-service"
        vault.hashicorp.com/agent-inject-template-http_port: |
          {{- with secret "kv/data/order-service" -}}{{ .Data.data.http_port }}{{- end }}
    spec:
      serviceAccountName: order-service-sa
      containers:
        - name: order-service
          image: dnahom/order-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: kafka
spec:
  selector:
    app: order-service
  ports:
    - port: 3000
      targetPort: 3000
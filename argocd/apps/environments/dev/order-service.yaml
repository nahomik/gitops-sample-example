apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: order-service-dev
  namespace: default
spec:
  project: sample-project
  source:
    repoURL: https://github.com/nahomik/gitops-sa
    targetRevision: HEAD
    path: k8s-manifests/overlays/dev/order-service
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: henosis-app-dev
  namespace: default
spec:
  project: sample-project
  source:
    repoURL: https://github.com/nahomik/gitops-sample-example.git
    targetRevision: HEAD
    path: k8s-manifests/overlays/dev/henosis-app
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true